name: Real-ESRGAN Python Fix

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  upscale:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          # Lock versions to match legacy basicsr requirements
          pip install torch==2.0.1 torchvision==0.15.2
          pip install basicsr
          pip install git+https://github.com/xinntao/Real-ESRGAN.git

      - name: Run Upscale Processing
        run: |
          # Use CPU flag explicitly
          python -m realesrgan.inference -n RealESRGAN_x4plus -i input.jpg -o output.jpg --fp32
