name: Real-ESRGAN Node.js CPU Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  upscale:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: |
          npm install @tensorflow/tfjs-node upscaler @upscalerjs/default-model

      - name: Download and Extract Source Zip
        run: |
          # 1. Fetch the zip bundle containing your images
          wget https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.5.0/realesrgan-ncnn-vulkan-20220424-ubuntu.zip
          
          # 2. Extract files into the current workspace directory root
          unzip realesrgan-ncnn-vulkan-20220424-ubuntu.zip

      - name: Run Upscale Script
        run: node upscale.js
