name: Real-ESRGAN Automation Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  upscale:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip libvulkan1

      - name: Download and Extract Real-ESRGAN Engine
        run: |
          wget https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.5.0/realesrgan-ncnn-vulkan-20220424-ubuntu.zip
          unzip realesrgan-ncnn-vulkan-20220424-ubuntu.zip

      - name: Set Executable Permissions
        run: |
          chmod +x upscayl_engine/realesrgan-ncnn-vulkan

      - name: Run Upscale Demo
        run: |
          ./upscayl_engine/realesrgan-ncnn-vulkan -i upscayl_engine/input.jpg -o upscayl_engine/output.jpg -n realesrgan-x4plus
