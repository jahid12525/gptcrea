name: Real-ESRGAN Python CPU Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  upscale:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-with-version: '3.10'

      - name: Install PyTorch and Real-ESRGAN
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install git+https://github.com/xinntao/Real-ESRGAN.git

      - name: Run Upscale Processing (Pure CPU)
        run: |
          # Uses python engine which works beautifully on standard virtual machines
          python -m realesrgan.inference -n RealESRGAN_x4plus -i input.jpg -o output.jpg --fp32
