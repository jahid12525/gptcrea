name: Dropbox Zip Image Upscaler

on:
  workflow_dispatch:
    inputs:
      dropbox_url:
        description: 'Paste your Dropbox zip link here'
        required: true
        type: string

jobs:
  upscale:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: ''

      - name: Install Node Dependencies
        run: |
          npm install @tensorflow/tfjs-node upscaler @upscalerjs/default-model

      - name: Download and Extract Dropbox Zip
        run: |
          mkdir -p input_images
          
          URL="${{ github.event.inputs.dropbox_url }}"
          DIRECT_URL=$(echo "$URL" | sed 's/\?dl=0/\?dl=1/g' | sed 's/\&dl=0/\&dl=1/g')
          
          echo "Downloading package..."
          wget -O package.zip "$DIRECT_URL"
          
          echo "Extracting image files..."
          unzip package.zip -d input_images/ || true

      - name: Run Batch Upscale Script
        run: node upscale.js

      - name: Upload Upscaled Images Artifact
        uses: actions/upload-artifact@v4
        with:
          name: upscaled-images-package
          path: output_images/
          retention-days: 7
