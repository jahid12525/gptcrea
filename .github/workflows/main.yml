name: Real-ESRGAN Debug and Setup Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  upscale:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip libvulkan1

      - name: Download and Extract Real-ESRGAN Engine
        run: |
          wget https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.5.0/realesrgan-ncnn-vulkan-20220424-ubuntu.zip
          unzip realesrgan-ncnn-vulkan-20220424-ubuntu.zip

      - name: Inspect Extracted Layout (Debug)
        run: |
          echo "=== Current Working Directory ==="
          pwd
          echo "=== Found Files and Locations ==="
          find . -name "realesrgan-ncnn-vulkan"
          echo "=== Full Directory Tree ==="
          find . -maxdepth 3

      - name: Attempt Permission Fix
        run: |
          # This line uses a safe fallback to find and chmod the binary automatically
          find . -type f -name "realesrgan-ncnn-vulkan" -exec chmod +x {} +
