name: Dropbox Zip Image Upscaler

on:
  workflow_dispatch:
    inputs:
      dropbox_url:
        description: 'https://www.dropbox.com/scl/fi/yad4k7z41i4pknwemqgoe/sw-1.zip?rlkey=jkek681un0vyl4ihyrm66qa24&st=45r1t3ie&dl=1'
        required: true
        type: string

jobs:
  upscale:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: |
          npm install @tensorflow/tfjs-node upscaler @upscalerjs/default-model

      - name: Download and Extract Dropbox Zip
        run: |
          # Create target directories for organization
          mkdir -p input_images
          
          # Convert standard Dropbox link sharing parameter (?dl=0 to ?dl=1) for direct download access
          URL="${{ github.event.inputs.dropbox_url }}"
          DIRECT_URL=$(echo "$URL" | sed 's/\?dl=0/\?dl=1/g' | sed 's/\&dl=0/\&dl=1/g')
          
          echo "Downloading package..."
          wget -O package.zip "$DIRECT_URL"
          
          echo "Extracting image files..."
          # Unzip files directly into input_images folder
          unzip package.zip -d input_images/ || true

      - name: Run Batch Upscale Script
        run: node upscale.js
